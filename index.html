<!DOCTYPE html>
<html lang="tr">

<meta charset="UTF-8">

<style>
*{box-sizing:border-box}
:root{
  --bg:#07111f;
  --panel:#0d1b2e;
  --panel-2:#0a1626;
  --line:#1d314d;
  --line-soft:#233b5e;
  --text:#e7edf7;
  --muted:#93a6c4;
  --blue:#2f6df6;
  --green:#23c483;
  --green-soft:#0f3a2b;
  --yellow:#f4c152;
  --yellow-soft:#473313;
  --red:#ff6b6b;
  --red-soft:#4b2020;
  --shadow:0 12px 40px rgba(0,0,0,.28);
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(circle at top right, rgba(47,109,246,.16), transparent 28%),
    radial-gradient(circle at top left, rgba(35,196,131,.08), transparent 22%),
    var(--bg);
  color:var(--text);
}
button,input,select,textarea{font:inherit}
.shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.05);
  background:rgba(7,17,31,.88);backdrop-filter:blur(16px);flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:5px}
.brand-title{font-size:15px;font-weight:800;letter-spacing:.7px}
.brand-sub{font-size:12px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.status-pill{
  min-width:96px;padding:8px 14px;border-radius:999px;border:1px solid var(--line-soft);
  background:var(--panel);text-align:center;font-size:12px;font-weight:700;letter-spacing:.3px;
  box-shadow:var(--shadow);
}
.status-live{background:rgba(35,196,131,.12);color:#8ce5bd;border-color:rgba(35,196,131,.35)}
.status-loading{background:rgba(244,193,82,.12);color:#ffd67d;border-color:rgba(244,193,82,.35)}
.status-fallback{background:rgba(255,107,107,.10);color:#ffb2b2;border-color:rgba(255,107,107,.28)}
.status-idle{background:rgba(255,255,255,.04);color:#d6e0ef}
.lang-group,.nav-group,.country-chips{display:flex;gap:8px;flex-wrap:wrap}
.lang-btn,.nav-btn,.chip-btn,.run-btn,.ghost-btn{
  border:1px solid var(--line-soft);background:var(--panel);color:var(--text);
  border-radius:12px;padding:10px 14px;font-size:13px;cursor:pointer;transition:.18s ease;
}
.lang-btn:hover,.nav-btn:hover,.chip-btn:hover,.run-btn:hover,.ghost-btn:hover{
  transform:translateY(-1px);border-color:#3a5d93;
}
.lang-btn.active,.nav-btn.active,.chip-btn.active{
  background:linear-gradient(180deg, #2f6df6 0%, #2457c6 100%);
  border-color:#2f6df6;color:#fff;
}
.run-btn{
  background:linear-gradient(180deg, #2f6df6 0%, #2457c6 100%);
  border-color:#2f6df6;color:#fff;font-weight:700;
}
.ghost-btn{background:var(--panel-2)}
.main-nav{padding:0 18px 16px}
.page{width:100%;max-width:1320px;margin:0 auto;padding:18px}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;margin-bottom:20px}
.panel{
  background:linear-gradient(180deg, rgba(13,27,46,.96), rgba(9,20,35,.96));
  border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);
}
.panel-title{font-size:14px;color:var(--muted);margin-bottom:14px}
.hero-top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
.hero-stat{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  border-radius:18px;padding:14px;
}
.hero-label{font-size:12px;color:var(--muted)}
.hero-value{margin-top:8px;font-size:24px;font-weight:800;letter-spacing:.2px}
.hero-mini{margin-top:6px;font-size:12px;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.field{display:flex;flex-direction:column;gap:7px}
.label{font-size:12px;color:var(--muted)}
.input{
  width:100%;background:#091321;color:var(--text);border:1px solid var(--line-soft);
  border-radius:14px;padding:13px 14px;outline:none;
}
.input:focus{border-color:#467af8}
.country-wrap{margin-top:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.helper{margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}
.message{margin-top:12px;font-size:13px}
.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.summary-item{
  background:#091321;border:1px solid var(--line);border-radius:16px;padding:12px;
}
.summary-label{font-size:12px;color:var(--muted)}
.summary-value{margin-top:7px;font-size:16px;font-weight:700;word-break:break-word}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
.card{
  background:linear-gradient(180deg, rgba(13,27,46,.96), rgba(9,20,35,.96));
  border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow);
}
.card-title{font-size:13px;color:var(--muted)}
.card-value{margin-top:9px;font-size:30px;font-weight:800;letter-spacing:.2px;word-break:break-word}
.card-text{margin-top:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;color:#dbe6f5}
.badge{
  display:inline-flex;align-items:center;justify-content:center;min-width:70px;
  margin-top:10px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;
}
.low{background:var(--green-soft);color:#87e0b8;border:1px solid rgba(35,196,131,.28)}
.mid{background:var(--yellow-soft);color:#ffd97f;border:1px solid rgba(244,193,82,.28)}
.high{background:var(--red-soft);color:#ffb6b6;border:1px solid rgba(255,107,107,.28)}
.raw-box{
  max-height:320px;overflow:auto;background:#07101c;border:1px solid var(--line);
  border-radius:16px;padding:12px;
}
.report-box{
  background:#07101c;border:1px solid var(--line);border-radius:18px;padding:16px;
  white-space:pre-wrap;line-height:1.7;color:#dbe6f5;
}
.footer{padding:24px 18px 34px;text-align:center;color:var(--muted);font-size:12px}
@media (max-width:1080px){.hero{grid-template-columns:1fr}}
@media (max-width:760px){
  .hero-top{grid-template-columns:repeat(2,minmax(0,1fr))}
  .summary-grid{grid-template-columns:1fr}
  .card-value{font-size:26px}
}
</style>
</head>

let currentLang = "tr";
let currentMessageKey = "ready";
let currentData = { ...FALLBACK_OUTPUT };
let selectedCountry = "TR";

function text(key){
  return (COPY[currentLang] && COPY[currentLang][key]) || COPY.tr[key] || key;
}

function normalizeValue(value){
  const v = String(value ?? "--").toLowerCase();
  return COPY[currentLang][v] || value || "--";
}

function normalizeLens(value){
  const v = String(value ?? "").toLowerCase();
  if(v === "trade") return COPY[currentLang].tradeLens;
  if(v === "invoice") return COPY[currentLang].invoice;
  if(v === "logistics") return COPY[currentLang].logistics;
  if(v === "compliance") return COPY[currentLang].compliance;
  if(v === "sme") return COPY[currentLang].sme;
  return value || "--";
}

function normalizeStrategy(value){
  const decision = String(currentData.decision || "").toLowerCase();

  if(decision === "reject"){
    if(currentLang === "tr") return "Pozisyona girme. Riski düşür, işlemi reddet.";
    if(currentLang === "ar") return "لا تدخل في الصفقة. قم بتقليل المخاطر ورفض العملية.";
    return "Do not proceed. Reduce exposure and reject the transaction.";
  }

  if(decision === "monitor"){
    if(currentLang === "tr") return "Kontrollü ilerle, maruziyeti yakından izlemeye devam et.";
    if(currentLang === "ar") return "تحرك بحذر واستمر في مراقبة التعرض عن كثب.";
    return "Proceed with caution and closely monitor exposure.";
  }

  if(decision === "approve"){
    if(currentLang === "tr") return "İşleme devam et. Risk kabul edilebilir seviyede.";
    if(currentLang === "ar") return "استمر في العملية. المخاطر ضمن الحدود المقبولة.";
    return "Proceed. Risk is within acceptable range.";
  }

  return value || "--";
}

function normalizeRationale(value){
  if(!value) return "--";
  const raw = String(value).toLowerCase();
  if(currentLang === "tr"){
    if(raw.includes("calculated via clean zentra stress model with live market context")) return "Canlı piyasa bağlamı ile temiz ZENTRA stres modeli kullanılarak hesaplandı.";
    if(raw.includes("calculated via clean zentra stress model")) return "Temiz ZENTRA stres modeli ile hesaplandı.";
    if(raw.includes("fallback mode is active")) return "Fallback modu aktif. Canlı veri alınamadı.";
  }
  if(currentLang === "ar"){
    if(raw.includes("calculated via clean zentra stress model with live market context")) return "تم الحساب باستخدام نموذج الضغط النظيف من ZENTRA مع سياق السوق الحي.";
    if(raw.includes("calculated via clean zentra stress model")) return "تم الحساب باستخدام نموذج الضغط النظيف من ZENTRA.";
    if(raw.includes("fallback mode is active")) return "وضع الاحتياطي نشط. لم يتم استلام بيانات مباشرة.";
  }
  return value;
}

function badgeBand(v){
  const n = Number(v || 0);
  if(n >= 70) return ["HIGH","high", text("highBand")];
  if(n >= 40) return ["MID","mid", text("midBand")];
  return ["LOW","low", text("lowBand")];
}

function buildLocalizedRaw(data){
  return {
    risk: data.risk_score ?? "--",
    stress: data.stress_score ?? "--",
    decision: normalizeValue(data.decision),
    macro: normalizeValue(data.macro_pressure),
    trade: data.trade_signal ?? "--",
    deviation: normalizeValue(data.deviation_level),
    regime: normalizeValue(data.regime),
    dominant_lens: normalizeLens(data.dominant_lens),
    strategy: normalizeStrategy(data.strategy),
    rationale: normalizeRationale(data.rationale),
    country: data.country ?? "--"
  };
}

function metricValue(v){
  if(v === null || v === undefined) return "--";
  return v;
}

function setStatusClass(value){
  const pill = document.getElementById("statusPill");
  pill.classList.remove("status-live","status-loading","status-fallback","status-idle");
  if(value === "live") pill.classList.add("status-live");
  else if(value === "loading") pill.classList.add("status-loading");
  else if(value === "fallback") pill.classList.add("status-fallback");
  else pill.classList.add("status-idle");
}

function updateStaticShell(){
  document.documentElement.lang = currentLang;
  document.getElementById("brandSub").innerText = text("brandSub");
  document.getElementById("nav-cockpit").innerText = text("cockpit");
  document.getElementById("nav-report").innerText = text("report");
  document.getElementById("nav-modules").innerText = text("modules");
  document.getElementById("footerText").innerText = text("footer");

  ["tr","en","ar"].forEach(code => {
    document.getElementById("lang-" + code).classList.toggle("active", currentLang === code);
  });

  const activeRoute = window.ZENTRA ? ZENTRA.get().route.current : "cockpit";
  document.getElementById("nav-cockpit").classList.toggle("active", activeRoute === "cockpit");
  document.getElementById("nav-report").classList.toggle("active", activeRoute === "report");
  document.getElementById("nav-modules").classList.toggle("active", activeRoute === "modules");

  if(window.ZENTRA){
    const connection = String(ZENTRA.get().connection.status || "idle");
    document.getElementById("statusPill").innerText = connection.toUpperCase();
    setStatusClass(connection);
  }

function setStatus(value){
  if(window.ZENTRA){
    ZENTRA.setConnection(value);
  }
  document.getElementById("statusPill").innerText = String(value || "idle").toUpperCase();
  setStatusClass(String(value || "idle"));
}

function setMessageByKey(key, extra){
  currentMessageKey = key;
  const el = document.getElementById("messageBox");
  if(el){
    el.innerText = extra ? (text(key) + " " + extra) : text(key);
  }
}

function goRoute(route){
  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.navigate(route);
  } else {
    window.location.hash = route;
  }
}

function setLang(lang){
  currentLang = lang;
  if(window.ZENTRA){
    ZENTRA.setLang(lang);
  }
  renderCurrentRoute();
}

function setCountry(code){
  selectedCountry = code;
  if(window.ZENTRA){
    const prev = ZENTRA.get().input || {};
    ZENTRA.setInput({ ...prev, country: code });

  renderCurrentRoute();
}

function buildUiInputFromDom(){

function buildApiPayload(ui){
  return {

    monthly_income: 90000,

function renderCurrentRoute(){
  updateStaticShell();
  const root = document.getElementById("app-root");
  const route = window.ZENTRA ? ZENTRA.get().route.current : "cockpit";

  if(route === "report"){
    root.innerHTML = renderReportPage();
  } else if(route === "modules"){
    root.innerHTML = renderModulesPage();
  } else {
    root.innerHTML = renderCockpitPage();
  }

  setMessageByKey(currentMessageKey);
}

function loadFallback(){
  currentData = { ...FALLBACK_OUTPUT, country: selectedCountry };
  if(window.ZENTRA){
    ZENTRA.setOutput({
      risk: currentData.risk_score,
      stress: currentData.stress_score,
      decision: currentData.decision,
      macro: currentData.macro_pressure,
      trade: currentData.trade_signal,
      deviation: currentData.deviation_level,
      regime: currentData.regime,
      dominant_lens: currentData.dominant_lens,
      strategy: currentData.strategy,
      rationale: currentData.rationale,
      raw: currentData.raw
    });
  }
  setStatus("fallback");
  currentMessageKey = "fallbackLoaded";
  renderCurrentRoute();
}

async function runRisk(){
  const uiInput = buildUiInputFromDom();
  const apiPayload = buildApiPayload(uiInput);

  if(window.ZENTRA){
    ZENTRA.setInput(uiInput);
    ZENTRA.setLoading(true);
    ZENTRA.clearError();
  }

  setStatus("loading");
  currentMessageKey = "sending";
  renderCurrentRoute();

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "zentra-demo-key"
      },
      body: JSON.stringify(apiPayload)
    });

    const json = await res.json();
    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    currentData = { ...json, raw: json };
    selectedCountry = String(json.country || selectedCountry || "TR").toUpperCase();

    if(window.ZENTRA){
      ZENTRA.setOutput({
        risk: json.risk_score,
        stress: json.stress_score,
        decision: json.decision,
        macro: json.macro_pressure,
        trade: json.trade_signal,
        deviation: json.deviation_level,
        regime: json.regime,
        dominant_lens: json.dominant_lens,
        strategy: json.strategy,
        rationale: json.rationale,
        raw: json
      });
      ZENTRA.setLoading(false);
    }

    setStatus("live");
    currentMessageKey = "liveReceived";
    renderCurrentRoute();
  }catch(err){
    if(window.ZENTRA){
      ZENTRA.setError(String(err.message || err));
      ZENTRA.setLoading(false);
    }
    loadFallback();
    currentMessageKey = "fallbackFail";
    renderCurrentRoute();
  }
}

(function bootstrap(){
  if(window.ZENTRA){
    if(!ZENTRA.get().input.amount){
      ZENTRA.setInput({
        amount: 150000,
        payment_delay_days: 7,
        customer_score: 72,
        exposure_ratio: 0.38,
        sector: "trade",
        country: "TR"
      });
      selectedCountry = "TR";
    } else {
      selectedCountry = String(ZENTRA.get().input.country || "TR").toUpperCase();
    }

    const originalSetRoute = ZENTRA.setRoute.bind(ZENTRA);
    ZENTRA.setRoute = function(route){
      originalSetRoute(route);
      renderCurrentRoute();
    };
  }

  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.init();
  } else if(window.ZENTRA) {
    const hash = window.location.hash.replace("#","") || "cockpit";
    ZENTRA.setRoute(hash);
  }

  setStatus("loading");
  currentMessageKey = "sending";
  renderCurrentRoute();

  Promise.resolve()
    .then(() => runRisk())
    .catch(e => {
      console.log("auto-live failed", e);
      loadFallback();
    });
})();
</script>
