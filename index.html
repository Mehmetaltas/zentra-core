<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Matrix Ecosystem</title>

<script src="./app/components/app-state.js"></script>
<script src="./app/components/app-router.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0b0f1a;
  color:#e5e7eb;
}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid #1f2937;
  background:#0f172a;
}
.brand-title{font-weight:700;font-size:14px}
.status-pill{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  border:1px solid #334155;
}
.nav{
  display:flex;
  gap:10px;
  padding:12px 20px;
  border-bottom:1px solid #1f2937;
}
button{
  cursor:pointer;
  border-radius:8px;
  border:1px solid #334155;
  padding:10px 12px;
  background:#111827;
  color:white;
}
.primary{background:#2563eb;border:none}
.page{padding:20px;max-width:1200px;margin:auto}
.grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{
  background:#111827;
  padding:16px;
  border-radius:12px;
  border:1px solid #1f2937;
}
.title{opacity:.6;font-size:13px}
.value{font-size:28px;font-weight:700;margin-top:6px}
.badge{margin-top:8px;font-size:12px;padding:4px 8px;border-radius:6px}
.low{background:#064e3b;color:#34d399}
.mid{background:#78350f;color:#fbbf24}
.high{background:#7f1d1d;color:#f87171}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand-title">ZENTRA MATRIX ECOSYSTEM</div>
  <div id="status" class="status-pill">IDLE</div>
</div>

<div class="nav">
  <button onclick="setLang('tr')">TR</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('ar')">AR</button>
</div>

<div class="page">

  <button class="primary" onclick="run()">RUN ANALYSIS</button>

  <div class="grid" id="grid"></div>

</div>

<script>
let lang="tr";

const API="/api/v1/credit-stress";

function t(v){
  const map={
    tr:{
      risk:"Risk",
      stress:"Stres",
      decision:"Karar",
      stable:"Stabil",
      moderate:"Orta",
      high:"Yüksek",
      monitor:"İzle",
      approve:"Onayla",
      reject:"Reddet"
    },
    en:{
      risk:"Risk",
      stress:"Stress",
      decision:"Decision"
    },
    ar:{
      risk:"المخاطر",
      stress:"الضغط",
      decision:"القرار"
    }
  };
  return map[lang][v]||v;
}

function norm(v){
  const m={
    monitor:"İzle",
    approve:"Onayla",
    reject:"Reddet",
    stable:"Stabil",
    moderate:"Orta",
    high:"Yüksek",
    low:"Düşük"
  };
  return m[v]||v;
}

function band(v){
  if(v>=70) return ["HIGH","high"];
  if(v>=40) return ["MID","mid"];
  return ["LOW","low"];
}

function render(d){
  const g=document.getElementById("grid");

  let [rb,rc]=band(d.risk_score);
  let [sb,sc]=band(d.stress_score);

  g.innerHTML=`
    <div class="card">
      <div class="title">${t("risk")}</div>
      <div class="value">${d.risk_score}</div>
      <div class="badge ${rc}">${rb}</div>
    </div>

    <div class="card">
      <div class="title">${t("stress")}</div>
      <div class="value">${d.stress_score}</div>
      <div class="badge ${sc}">${sb}</div>
    </div>

    <div class="card">
      <div class="title">${t("decision")}</div>
      <div class="value">${norm(d.decision)}</div>
    </div>

    <div class="card">
      <div class="title">Macro</div>
      <div class="value">${norm(d.macro_pressure)}</div>
    </div>
  `;
}

async function run(){
  document.getElementById("status").innerText="LOADING";

  try{
    const res=await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":"zentra-demo-key"
      },
      body:JSON.stringify({
        principal:150000,
        interest_rate:24,
        term_months:12,
        monthly_income:90000,
        sector:"trade",
        sector_risk_level:0.5,
        payment_delay_days:7,
        customer_score:72,
        exposure_ratio:0.38
      })
    });

    const data=await res.json();

    render(data);
    document.getElementById("status").innerText="LIVE";

  }catch(e){
    document.getElementById("status").innerText="ERROR";
  }
}

function setLang(l){
  lang=l;
}
</script>

</body>
</html>
