<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Matrix Ecosystem</title>

<script src="./app/components/app-state.js"></script>
<script src="./app/components/app-router.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0b0f1a;
  color:#e5e7eb;
}
button,input,select,textarea{font:inherit}
.shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:18px 20px;border-bottom:1px solid #1f2937;background:#0f172a;
  position:sticky;top:0;z-index:20;flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:4px}
.brand-title{font-size:15px;font-weight:700;letter-spacing:.6px}
.brand-sub{font-size:12px;opacity:.68}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.status-pill{
  display:inline-flex;align-items:center;justify-content:center;min-width:90px;
  padding:7px 12px;border-radius:999px;font-size:12px;border:1px solid #243041;
  background:#111827;color:#cbd5e1;
}
.lang-group{display:flex;gap:6px;flex-wrap:wrap}
.lang-btn,.nav-btn,.run-btn,.ghost-btn{
  border:1px solid #334155;background:#111827;color:#e5e7eb;
  border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;
}
.lang-btn.active,.nav-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.main-nav{
  display:flex;gap:10px;padding:14px 20px;border-bottom:1px solid #1f2937;
  background:#0b1220;flex-wrap:wrap;
}
.page{width:100%;max-width:1240px;margin:0 auto;padding:20px}
.hero{
  display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-bottom:20px;
}
.panel{
  background:#111827;border:1px solid #1f2937;border-radius:16px;padding:18px;
}
.panel-title{font-size:14px;opacity:.72;margin-bottom:14px}
.form-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;
}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-size:12px;opacity:.75}
.input,.select{
  width:100%;background:#0b1220;color:#e5e7eb;border:1px solid #334155;
  border-radius:10px;padding:12px;font-size:14px;outline:none;
}
.input:focus,.select:focus{border-color:#2563eb}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.run-btn{background:#2563eb;border-color:#2563eb;color:#fff}
.helper{margin-top:10px;font-size:12px;opacity:.68;line-height:1.5}
.message{margin-top:12px;font-size:13px;opacity:.92}
.summary-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;
}
.summary-item{
  background:#0b1220;border:1px solid #263244;border-radius:12px;padding:12px;
}
.summary-label{font-size:12px;opacity:.65}
.summary-value{margin-top:6px;font-size:16px;font-weight:700;word-break:break-word}
.grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;
}
.card{
  background:#111827;border:1px solid #1f2937;border-radius:14px;padding:16px;
}
.card-title{font-size:13px;opacity:.68}
.card-value{font-size:30px;font-weight:700;margin-top:8px;word-break:break-word}
.card-text{margin-top:10px;font-size:13px;line-height:1.55;opacity:.88;white-space:pre-wrap}
.badge{
  display:inline-block;padding:4px 8px;border-radius:8px;font-size:12px;margin-top:10px;
}
.low{background:#064e3b;color:#34d399}
.mid{background:#78350f;color:#fbbf24}
.high{background:#7f1d1d;color:#f87171}
.footer{padding:20px;text-align:center;opacity:.5;font-size:12px}
@media (max-width:900px){
  .hero{grid-template-columns:1fr}
}
</style>
</head>

    <div class="brand">

let currentLang = "tr";
let currentMessageKey = "ready";
let currentData = { ...FALLBACK_OUTPUT };

function text(key){
  return (COPY[currentLang] && COPY[currentLang][key]) || COPY.tr[key] || key;
}

function normalizeValue(value){
  const v = String(value ?? "--").toLowerCase();
  return COPY[currentLang][v] || value || "--";
}

function normalizeLens(value){
  const v = String(value ?? "").toLowerCase();
  if(v === "trade") return COPY[currentLang].tradeLens;
  if(v === "invoice") return COPY[currentLang].invoice;
  if(v === "logistics") return COPY[currentLang].logistics;
  if(v === "compliance") return COPY[currentLang].compliance;
  if(v === "sme") return COPY[currentLang].sme;
  return value || "--";
}

function normalizeStrategy(value){
  if(!value) return "--";
  const raw = String(value).toLowerCase();

  if(currentLang === "tr"){
    if(raw.includes("controlled caution")) return "Kontrollü ilerle, maruziyeti izlemeye devam et.";
    if(raw.includes("reduce exposure")) return "Maruziyeti azalt ve riski düşür.";
  }

  if(currentLang === "ar"){
    if(raw.includes("controlled caution")) return "تحرك بحذر مع الاستمرار في مراقبة التعرض.";
    if(raw.includes("reduce exposure")) return "قم بتقليل التعرض وخفض المخاطر.";
  }

  return value;
}

function normalizeRationale(value){
  if(!value) return "--";
  const raw = String(value).toLowerCase();

  if(currentLang === "tr"){
    if(raw.includes("calculated via clean zentra stress model with live market context")) return "Canlı piyasa bağlamı ile temiz ZENTRA stres modeli kullanılarak hesaplandı.";
    if(raw.includes("calculated via clean zentra stress model")) return "Temiz ZENTRA stres modeli ile hesaplandı.";
    if(raw.includes("fallback mode is active")) return "Fallback modu aktif. Canlı veri alınamadı.";
  }

  if(currentLang === "ar"){
    if(raw.includes("calculated via clean zentra stress model with live market context")) return "تم الحساب باستخدام نموذج الضغط النظيف من ZENTRA مع سياق السوق الحي.";
    if(raw.includes("calculated via clean zentra stress model")) return "تم الحساب باستخدام نموذج الضغط النظيف من ZENTRA.";
    if(raw.includes("fallback mode is active")) return "وضع الاحتياطي نشط. لم يتم استلام بيانات مباشرة.";
  }

  return value;
}

function badgeBand(v){
  const n = Number(v || 0);
  if(n >= 70) return ["HIGH","high", text("highBand")];
  if(n >= 40) return ["MID","mid", text("midBand")];
  return ["LOW","low", text("lowBand")];
}

function buildLocalizedRaw(data){
  return {
    risk: data.risk_score ?? "--",
    stress: data.stress_score ?? "--",
    decision: normalizeValue(data.decision),
    macro: normalizeValue(data.macro_pressure),
    trade: data.trade_signal ?? "--",
    deviation: normalizeValue(data.deviation_level),
    regime: normalizeValue(data.regime),
    dominant_lens: normalizeLens(data.dominant_lens),
    strategy: normalizeStrategy(data.strategy),
    rationale: normalizeRationale(data.rationale),
    country: data.country ?? "--"
  };
}

function updateStaticShell(){
  document.documentElement.lang = currentLang;
  document.getElementById("brandSub").innerText = text("brandSub");
  document.getElementById("nav-cockpit").innerText = text("cockpit");
  document.getElementById("nav-report").innerText = text("report");
  document.getElementById("nav-modules").innerText = text("modules");
  document.getElementById("footerText").innerText = text("footer");

  ["tr","en","ar"].forEach(code => {
    document.getElementById("lang-" + code).classList.toggle("active", currentLang === code);
  });

  const activeRoute = window.ZENTRA ? ZENTRA.get().route.current : "cockpit";
  document.getElementById("nav-cockpit").classList.toggle("active", activeRoute === "cockpit");
  document.getElementById("nav-report").classList.toggle("active", activeRoute === "report");
  document.getElementById("nav-modules").classList.toggle("active", activeRoute === "modules");

  if(window.ZENTRA){
    document.getElementById("statusPill").innerText = String(ZENTRA.get().connection.status || "idle").toUpperCase();
  }
}

function setStatus(value){
  if(window.ZENTRA){
    ZENTRA.setConnection(value);
  }
  document.getElementById("statusPill").innerText = String(value || "idle").toUpperCase();
}

function setMessageByKey(key, extra){
  currentMessageKey = key;
  const el = document.getElementById("messageBox");
  if(el){
    el.innerText = extra ? (text(key) + " " + extra) : text(key);
  }
}

function goRoute(route){
  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.navigate(route);
  }else{
    window.location.hash = route;
  }
}

function setLang(lang){
  currentLang = lang;
  if(window.ZENTRA){
    ZENTRA.setLang(lang);
  }
  renderCurrentRoute();
}

  return {
    amount: Number(document.getElementById("amount").value || 0),
    payment_delay_days: Number(document.getElementById("paymentDelayDays").value || 0),
    customer_score: Number(document.getElementById("customerScore").value || 0),
    exposure_ratio: Number(String(document.getElementById("exposureRatio").value || 0).replace(",", ".")),
    sector: document.getElementById("sector").value || "trade",
    country: document.getElementById("country").value || "TR"
  };
}

function buildApiPayload(ui){
  return {
    principal: Number(ui.amount || 0),
    interest_rate: 24,
    term_months: 12,
    monthly_income: 90000,
    sector: ui.sector || "trade",
    sector_risk_level: 0.5,
    payment_delay_days: Number(ui.payment_delay_days || 0),
    customer_score: Number(ui.customer_score || 50),
    exposure_ratio: Number(ui.exposure_ratio || 0),
    country: String(ui.country || "TR").toUpperCase()
  };
}

function metricValue(v){
  if(v === null || v === undefined) return "--";
  return v;

            </div>
            <div class="summary-item">
              <div class="summary-label">${text("stateLang")}</div>
              <div class="summary-value">${state.lang.active || "--"}</div>

            <div class="summary-item">
              <div class="summary-label">${text("stateConnection")}</div>
              <div class="summary-value">${state.connection.status || "--"}</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">${text("stateUpdated")}</div>
              <div class="summary-value">${state.ui.last_update ? new Date(state.ui.last_update).toLocaleString() : "--"}</div>

      <div class="grid">
        <div class="card">

          <div class="card-title">${text("strategy")}</div>
          <div class="card-text">${normalizeStrategy(currentData.strategy)}</div>

        <div class="card">
          <div class="card-title">${text("rationale")}</div>
          <div class="card-text">${normalizeRationale(currentData.rationale)}</div>

        <div class="card">
          <div class="card-title">${text("marketContext")}</div>
          <div class="card-text">${text("countryLabel")}: ${currentData.country || ctxInfo.country || "--"}
${text("countryName")}: ${ctxInfo.country_label || "--"}
${text("contextDate")}: ${ctxInfo.date || "--"}
${text("macro")}: ${normalizeValue(macro.pressure || currentData.macro_pressure)}
${text("fxAdjustment")}: ${metricValue(adj.fx_adjustment)}
${text("macroPenalty")}: ${metricValue(adj.macro_penalty)}
${text("usdTry")}: ${metricValue(market.usd_try)}
${text("eurUsd")}: ${metricValue(market.eur_usd)}
${text("usdAed")}: ${metricValue(market.usd_aed)}
${text("usdSar")}: ${metricValue(market.usd_sar)}
${text("gbpUsd")}: ${metricValue(market.gbp_usd)}</div>

}

function renderReportPage(){
  return `
    <div class="page">
      <div class="panel">
        <div class="panel-title">${text("reportTitle")}</div>
        <div class="card-text">${text("reportText")}</div>
      </div>
    </div>
  `;
}

function renderModulesPage(){
  return `
    <div class="page">
      <div class="panel">
        <div class="panel-title">${text("modulesTitle")}</div>
        <div class="card-text">${text("modulesText")}</div>
      </div>
    </div>
  `;
}

function renderCurrentRoute(){
  updateStaticShell();
  const root = document.getElementById("app-root");
  const route = window.ZENTRA ? ZENTRA.get().route.current : "cockpit";

  if(route === "report"){
    root.innerHTML = renderReportPage();
  } else if(route === "modules"){
    root.innerHTML = renderModulesPage();
  } else {
    root.innerHTML = renderCockpitPage();
  }

  setMessageByKey(currentMessageKey);
}

function loadFallback(){
  currentData = { ...FALLBACK_OUTPUT };
  if(window.ZENTRA){
    ZENTRA.setOutput({
      risk: currentData.risk_score,
      stress: currentData.stress_score,
      decision: currentData.decision,
      macro: currentData.macro_pressure,
      trade: currentData.trade_signal,
      deviation: currentData.deviation_level,
      regime: currentData.regime,
      dominant_lens: currentData.dominant_lens,
      strategy: currentData.strategy,
      rationale: currentData.rationale,
      raw: currentData.raw
    });
  }
  setStatus("fallback");
  currentMessageKey = "fallbackLoaded";
  renderCurrentRoute();
}

async function runRisk(){
  const uiInput = buildUiInputFromDom();
  const apiPayload = buildApiPayload(uiInput);

  if(window.ZENTRA){
    ZENTRA.setInput(uiInput);
    ZENTRA.setLoading(true);
    ZENTRA.clearError();
  }

  setStatus("loading");
  currentMessageKey = "sending";
  renderCurrentRoute();

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "zentra-demo-key"
      },
      body: JSON.stringify(apiPayload)
    });

    const json = await res.json();
    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    currentData = { ...json, raw: json };

    if(window.ZENTRA){
      ZENTRA.setOutput({
        risk: json.risk_score,
        stress: json.stress_score,
        decision: json.decision,
        macro: json.macro_pressure,
        trade: json.trade_signal,
        deviation: json.deviation_level,
        regime: json.regime,
        dominant_lens: json.dominant_lens,
        strategy: json.strategy,
        rationale: json.rationale,
        raw: json
      });
      ZENTRA.setLoading(false);
    }

    setStatus("live");
    currentMessageKey = "liveReceived";
    renderCurrentRoute();
  }catch(err){
    if(window.ZENTRA){
      ZENTRA.setError(String(err.message || err));
      ZENTRA.setLoading(false);
    }
    loadFallback();
    currentMessageKey = "fallbackFail";
    renderCurrentRoute();
  }
}

(function bootstrap(){
  if(window.ZENTRA){
    if(!ZENTRA.get().input.amount){
      ZENTRA.setInput({
        amount: 150000,
        payment_delay_days: 7,
        customer_score: 72,
        exposure_ratio: 0.38,
        sector: "trade",
        country: "TR"
      });
    }

    const originalSetRoute = ZENTRA.setRoute.bind(ZENTRA);
    ZENTRA.setRoute = function(route){
      originalSetRoute(route);
      renderCurrentRoute();
    };
  }

  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.init();
  } else if(window.ZENTRA) {
    const hash = window.location.hash.replace("#","") || "cockpit";
    ZENTRA.setRoute(hash);
  }

  setStatus("fallback");
  renderCurrentRoute();
})();
</script>
