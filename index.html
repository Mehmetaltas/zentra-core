<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZENTRA MATRIX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1a2b;
  color: white;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

h1 {
  font-size: 20px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #2d6cff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}

.success {
  color: #4caf50;
}

.error {
  color: #ff4d4d;
}

.report-box {
  margin-top: 20px;
  background: #0f2a44;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h1>ZENTRA Raporu</h1>

  <input id="email" placeholder="Mail adresi gir" />
  <button id="sendBtn">Rapor Gönder</button>

  <div id="status" class="status"></div>
  <div id="report" class="report-box"></div>
</div>

<script>
const sendBtn = document.getElementById("sendBtn");
const statusBox = document.getElementById("status");
const reportBox = document.getElementById("report");

function generateReport() {
  const now = new Date().toLocaleString("tr-TR");
  return `ZENTRA Raporu

Rapor Tarihi: ${now}

--- Yönetici Özeti ---
Ülke Kodu: TR
Karar: Reddet
Rejim: Kırılgan
Strateji: Pozisyona girme. Riski düşür, işlemi reddet.`;
}

sendBtn.onclick = async () => {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    statusBox.textContent = "Mail adresi gir";
    statusBox.className = "status error";
    return;
  }

  const report = generateReport();
  reportBox.textContent = report;

  sendBtn.disabled = true;
  statusBox.textContent = "Gönderiliyor...";
  statusBox.className = "status";

  try {
    const res = await fetch("https://zentra-core.vercel.app/api/v1/send-report", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        to: email,
        subject: "ZENTRA LIVE",
        text: report
      })
    });

    const data = await res.json();

    if (data.ok) {
      statusBox.textContent = "Mail gönderildi ✔";
      statusBox.className = "status success";
    } else {
      throw new Error(data.detail || "Gönderim başarısız");
    }
  } catch (e) {
    statusBox.textContent = "Gönderim hatası";
    statusBox.className = "status error";
  }

  sendBtn.disabled = false;
};
</script>

</body>
</html>
