<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Cockpit</title>

<script src="./components/app-state.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:#e5e7eb;}
.header{padding:20px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px;}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;}
.value{font-size:28px;font-weight:700;}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;}
.low{background:#064e3b;color:#34d399;}
.mid{background:#78350f;color:#fbbf24;}
.high{background:#7f1d1d;color:#f87171;}
input,select{width:100%;padding:10px;background:#0b1220;border:1px solid #334155;color:#fff;border-radius:8px;}
button{padding:10px;border:0;border-radius:8px;background:#2563eb;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
  <div>ZENTRA COCKPIT</div>
  <div id="status">READY</div>
</div>

<div style="padding:20px">
  <input id="amount" placeholder="Amount" value="150000">
  <input id="delay" placeholder="Delay" value="5">
  <input id="score" placeholder="Customer Score" value="70">
  <input id="exposure" placeholder="Exposure" value="0.4">
  <select id="sector">
    <option value="trade">trade</option>
    <option value="invoice">invoice</option>
  </select>
  <button onclick="run()">RUN</button>
</div>

<div class="grid">

<div class="card"><div>Risk</div><div id="risk" class="value">--</div></div>
<div class="card"><div>Stress</div><div id="stress" class="value">--</div></div>
<div class="card"><div>Decision</div><div id="decision" class="value">--</div></div>
<div class="card"><div>Macro</div><div id="macro" class="value">--</div></div>
<div class="card"><div>Trade</div><div id="trade" class="value">--</div></div>

</div>

<script>

const API = "https://zentra-credit-stress-api.onrender.com/v1/risk";

function band(v){
  if(v>=70) return "high";
  if(v>=40) return "mid";
  return "low";
}

function render(){
  const s = ZENTRA.get();

  document.getElementById("risk").innerText = s.output.risk ?? "--";
  document.getElementById("stress").innerText = s.output.stress ?? "--";
  document.getElementById("decision").innerText = s.output.decision ?? "--";
  document.getElementById("macro").innerText = s.output.macro ?? "--";
  document.getElementById("trade").innerText = s.output.trade ?? "--";

  document.getElementById("status").innerText = s.connection.status.toUpperCase();
}

function collectInput(){
  return {
    amount: Number(document.getElementById("amount").value),
    payment_delay_days: Number(document.getElementById("delay").value),
    customer_score: Number(document.getElementById("score").value),
    exposure_ratio: Number(document.getElementById("exposure").value),
    sector: document.getElementById("sector").value
  };
}

async function run(){

  const payload = collectInput();

  ZENTRA.setInput(payload);
  ZENTRA.setConnection("loading");
  render();

  try{

    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    ZENTRA.setOutput({
      risk: data.risk_score,
      stress: data.stress_score,
      decision: data.decision,
      macro: data.macro_pressure,
      trade: data.trade_signal,
      raw: data
    });

    ZENTRA.setConnection("live");

  }catch(e){

    ZENTRA.setOutput({
      risk:62,
      stress:44,
      decision:"Monitor",
      macro:"Moderate",
      trade:64
    });

    ZENTRA.setConnection("fallback");

  }

  render();
}

render();

</script>

</body>
</html>
