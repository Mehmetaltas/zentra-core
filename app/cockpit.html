<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Cockpit</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
  background:#0b0f1a;
  color:#e5e7eb;
}
.header{
  padding:20px;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.logo{
  font-weight:700;
  letter-spacing:1px;
}
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
}
.lang{
  cursor:pointer;
  font-size:12px;
  opacity:.8;
}
.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  border:1px solid #243041;
  background:#0f172a;
  color:#cbd5e1;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
}
.title{
  font-size:13px;
  opacity:.65;
}
.value{
  font-size:32px;
  font-weight:700;
  margin-top:6px;
}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}
.low{background:#064e3b;color:#34d399;}
.mid{background:#78350f;color:#fbbf24;}
.high{background:#7f1d1d;color:#f87171;}
.section{
  margin-top:10px;
  font-size:13px;
  opacity:.85;
  line-height:1.5;
}
.footer{
  padding:20px;
  text-align:center;
  opacity:.5;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">ZENTRA COCKPIT</div>
  <div class="header-right">
    <div id="statusPill" class="status">FALLBACK</div>
    <div class="lang" onclick="toggleLang()">TR / EN</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="title" id="riskLabel">Risk</div>
    <div class="value" id="risk">--</div>
    <div id="riskBand" class="badge">-</div>
  </div>

  <div class="card">
    <div class="title" id="stressLabel">Stres</div>
    <div class="value" id="stress">--</div>
    <div id="stressBand" class="badge">-</div>
  </div>

  <div class="card">
    <div class="title" id="decisionLabel">Karar</div>
    <div class="value" id="decision">--</div>
  </div>

  <div class="card">
    <div class="title" id="macroLabel">Macro</div>
    <div class="value" id="macro">--</div>
    <div class="section" id="macroNote"></div>
  </div>

  <div class="card">
    <div class="title" id="tradeLabel">Trade Signal</div>
    <div class="value" id="trade">--</div>
  </div>

  <div class="card">
    <div class="title" id="deviationLabel">Deviation</div>
    <div class="value" id="deviation">--</div>
  </div>
</div>

<div class="footer">ZENTRA Intel AI • Live Cockpit</div>

<script>
let lang = "tr";

const fallbackData = {
  risk: 62,
  stress: 44,
  decision: "Monitor",
  macro: "Moderate",
  trade: 64,
  deviation: "Low"
};

function bandClass(v){
  if(v >= 70) return ["HIGH", "high"];
  if(v >= 40) return ["MID", "mid"];
  return ["LOW", "low"];
}

function normalizeDecisionText(value){
  if(lang === "tr"){
    if(value === "Monitor") return "İzle";
    if(value === "Approve") return "Onayla";
    if(value === "Reject") return "Reddet";
  }
  return value;
}

function normalizeMacroText(value){
  if(lang === "tr"){
    if(value === "Moderate") return "Orta";
    if(value === "Elevated") return "Yüksek";
    if(value === "Stable") return "Stabil";
    if(value === "High") return "Yüksek";
  }
  return value;
}

function normalizeDeviationText(value){
  if(lang === "tr"){
    if(value === "Low") return "Düşük";
    if(value === "Moderate") return "Orta";
    if(value === "High") return "Yüksek";
  }
  return value;
}

function setStatus(isLive){
  const pill = document.getElementById("statusPill");
  pill.innerText = isLive ? "LIVE" : "FALLBACK";
}

function renderData(data){
  document.getElementById("risk").innerText = data.risk;
  document.getElementById("stress").innerText = data.stress;
  document.getElementById("decision").innerText = normalizeDecisionText(data.decision);
  document.getElementById("macro").innerText = normalizeMacroText(data.macro);
  document.getElementById("trade").innerText = data.trade;
  document.getElementById("deviation").innerText = normalizeDeviationText(data.deviation);

  const [rb, rc] = bandClass(Number(data.risk));
  const riskBand = document.getElementById("riskBand");
  riskBand.innerText = rb;
  riskBand.className = "badge " + rc;

  const [sb, sc] = bandClass(Number(data.stress));
  const stressBand = document.getElementById("stressBand");
  stressBand.innerText = sb;
  stressBand.className = "badge " + sc;

  updateMacroNote(data.macro);
}

function updateMacroNote(macroValue){
  const note = document.getElementById("macroNote");
  const normalized = String(macroValue || "").toLowerCase();

  if(lang === "tr"){
    if(normalized.includes("moderate") || normalized.includes("orta")){
      note.innerText = "Makro baskı orta seviyede.";
    } else if(normalized.includes("high") || normalized.includes("elevated") || normalized.includes("yüksek")){
      note.innerText = "Makro baskı yükselmiş görünüyor.";
    } else {
      note.innerText = "Makro görünüm stabil seyrediyor.";
    }
  } else {
    if(normalized.includes("moderate")){
      note.innerText = "Macro pressure is moderate.";
    } else if(normalized.includes("high") || normalized.includes("elevated")){
      note.innerText = "Macro pressure appears elevated.";
    } else {
      note.innerText = "Macro outlook remains stable.";
    }
  }
}

function applyLang(){
  if(lang === "tr"){
    document.getElementById("riskLabel").innerText = "Risk";
    document.getElementById("stressLabel").innerText = "Stres";
    document.getElementById("decisionLabel").innerText = "Karar";
    document.getElementById("macroLabel").innerText = "Macro";
    document.getElementById("tradeLabel").innerText = "Trade Signal";
    document.getElementById("deviationLabel").innerText = "Deviation";
  } else {
    document.getElementById("riskLabel").innerText = "Risk";
    document.getElementById("stressLabel").innerText = "Stress";
    document.getElementById("decisionLabel").innerText = "Decision";
    document.getElementById("macroLabel").innerText = "Macro";
    document.getElementById("tradeLabel").innerText = "Trade Signal";
    document.getElementById("deviationLabel").innerText = "Deviation";
  }
}

function toggleLang(){
  lang = lang === "tr" ? "en" : "tr";
  applyLang();

  const currentData = {
    risk: document.getElementById("risk").innerText || fallbackData.risk,
    stress: document.getElementById("stress").innerText || fallbackData.stress,
    decision: fallbackData.decision,
    macro: fallbackData.macro,
    trade: document.getElementById("trade").innerText || fallbackData.trade,
    deviation: fallbackData.deviation
  };

  renderData(currentData);
}

async function load(){
  renderData(fallbackData);
  setStatus(false);

  try{
    const res = await fetch("https://zentra-credit-stress-api.onrender.com/health", {
      method: "GET"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    await res.json();

    setStatus(true);
    renderData(fallbackData);
  }catch(err){
    console.log("API fallback active:", err);
    setStatus(false);
    renderData(fallbackData);
  }
}

applyLang();
load();
</script>

</body>
</html>
