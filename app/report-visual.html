<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Visual Proof</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:#fff;margin:0;padding:20px}
.card{background:#121a2f;padding:20px;border-radius:12px;margin-bottom:15px}
.bar{height:10px;background:#333;border-radius:10px;overflow:hidden;margin:8px 0 14px}
.fill{height:10px;background:linear-gradient(90deg,#00c6ff,#ff4d4d);width:0%;transition:width 1s ease}
.indicator{display:flex;justify-content:space-between;margin:8px 0}
.badge{padding:5px 10px;border-radius:6px;font-weight:bold}
.green{background:#1f8f4e}.yellow{background:#d9a300}.red{background:#b30000}
.trace{margin-top:10px;font-size:13px;opacity:.9}
pre{white-space:pre-wrap;background:#0b1222;padding:12px;border-radius:10px;color:#dce7ff}
</style>
</head>
<body>

<h2>ZENTRA — Visual Proof Report</h2>

<div class="card">
  <h3>Decision</h3>
  <div id="decisionBox"></div>
</div>

<div class="card">
  <h3>Indicators</h3>
  <div class="indicator">Risk <span id="riskBadge"></span></div>
  <div class="indicator">Payment <span id="paymentBadge"></span></div>
  <div class="indicator">Limit <span id="limitBadge"></span></div>
  <div class="indicator">Policy <span id="policyBadge"></span></div>
</div>

<div class="card">
  <h3>Metrics</h3>
  <div>DTI</div><div class="bar"><div id="dtiBar" class="fill"></div></div>
  <div>Payment Load</div><div class="bar"><div id="paymentBar" class="fill"></div></div>
  <div>Limit Ratio</div><div class="bar"><div id="limitBar" class="fill"></div></div>
</div>

<div class="card">
  <h3>Decision Flow</h3>
  <div id="flow"></div>
</div>

<div class="card">
  <h3>Raw Proof</h3>
  <pre id="raw"></pre>
</div>

<script>
function getData(){
  try{
    if(window.parent && window.parent.ZENTRA_DATA){
      return window.parent.ZENTRA_DATA;
    }
  }catch(e){}
  if(window.ZENTRA_DATA){
    return window.ZENTRA_DATA;
  }
  return null;
}

function setBar(id,value,max){
  document.getElementById(id).style.width = Math.min((Number(value || 0)/max)*100,100)+"%";
}

function badge(id,text,color){
  document.getElementById(id).innerHTML=`<span class="badge ${color}">${text}</span>`;
}

function render(){
  const data = getData();

  if(!data){
    document.getElementById("decisionBox").innerHTML = "Rapor verisi bulunamadı.";
    return;
  }

  const r = data.result ? data.result : data;
  const derived = r.derived || {};
  const policy = r.policy || {};
  const explain = Array.isArray(r.explain) ? r.explain : [];

  document.getElementById("decisionBox").innerHTML =
    `<b>Karar:</b> ${r.decision || "-"}<br>` +
    `<b>Skor:</b> ${r.score ?? "-"}<br><br>` +
    explain.map(x=>"• "+x).join("<br>");

  setBar("dtiBar",derived.debt_to_income || 0,10);
  setBar("paymentBar",derived.payment_load || 0,1);
  setBar("limitBar",derived.limit_ratio || 0,5);

  badge("riskBadge",r.decision || "-",r.decision==="Reddet"?"red":(r.decision==="İncele"?"yellow":"green"));
  badge("paymentBadge",(derived.payment_load || 0)>0.5?"HIGH":"OK",(derived.payment_load || 0)>0.5?"red":"green");
  badge("limitBadge",(derived.limit_ratio || 0)>4?"HIGH":"OK",(derived.limit_ratio || 0)>4?"red":"green");
  badge("policyBadge",policy.mode || "OFF",(policy.mode==="ON"?"yellow":"green"));

  const steps=[
    "Input alındı",
    "Derived metrikler hesaplandı",
    "Rules çalıştı",
    "Policy kontrol edildi",
    "Decision üretildi",
    "Trace + Proof kaydı oluşturuldu"
  ];

  const flow=document.getElementById("flow");
  flow.innerHTML="";
  let i=0;
  const int=setInterval(()=>{
    if(i>=steps.length){clearInterval(int);return;}
    const d=document.createElement("div");
    d.className="trace";
    d.innerText="✔ "+steps[i];
    flow.appendChild(d);
    i++;
  },300);

  document.getElementById("raw").innerText = JSON.stringify(r,null,2);
}

render();
</script>

</body>
</html>
