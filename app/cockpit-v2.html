<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ZENTRA Cockpit V2</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
.wrap{max-width:1100px;margin:20px auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.card{background:#111a2f;border-radius:14px;padding:16px}
.label{font-size:11px;color:#9aa3b2;text-transform:uppercase}
.value{font-size:28px;font-weight:800;margin-top:6px}
.big{font-size:48px;font-weight:900}
.section{margin-top:20px}
.row{display:flex;justify-content:space-between;margin-top:8px}
.box{margin-top:8px;line-height:1.5;color:#d1d5db}
</style>
</head>

<body>
<div class="wrap">

<!-- DECISION SURFACE -->
<div class="card">
  <div class="label">Final Decision</div>
  <div class="big" id="decision"></div>
  <div class="box" id="decisionExplain"></div>
</div>

<!-- METRICS -->
<div class="grid section">

  <div class="card">
    <div class="label">Risk Score</div>
    <div class="value" id="risk"></div>
  </div>

  <div class="card">
    <div class="label">Stress</div>
    <div class="value" id="stress"></div>
  </div>

  <div class="card">
    <div class="label">Confidence</div>
    <div class="value" id="confidence"></div>
  </div>

</div>

<!-- INSIGHT -->
<div class="card section">
  <div class="label">Insight</div>
  <div id="insight" class="box"></div>
</div>

<!-- ASSISTANT -->
<div class="card section">
  <div class="label">Assistant</div>
  <div id="assistant" class="box"></div>
</div>

<!-- PORTFOLIO -->
<div class="card section">
  <div class="label">Portfolio View</div>
  <div id="portfolio"></div>
</div>

</div>

<script>

const data = {
decision:"BUY",
risk:72,
stress:64,
confidence:78,
drivers:[
"Macro trend positive",
"Risk aligned with decision",
"Liquidity stable"
],
portfolio:[
["Risk Intelligence","CAUTION","72"],
["Credit Intelligence","REVIEW","66"],
["Financial Trade","BUY","78"]
]
};

// decision
document.getElementById("decision").textContent = data.decision;
document.getElementById("decisionExplain").textContent =
"Controlled execution recommended. Risk elevated but manageable.";

// metrics
document.getElementById("risk").textContent = data.risk;
document.getElementById("stress").textContent = data.stress;
document.getElementById("confidence").textContent = data.confidence+"%";

// insight
document.getElementById("insight").innerHTML =
data.drivers.map(x=>"<div>"+x+"</div>").join("");

// assistant
document.getElementById("assistant").innerHTML =
"WHY: Signal strong<br>ACTION: Controlled entry<br>WARNING: High risk";

// portfolio
document.getElementById("portfolio").innerHTML =
data.portfolio.map(p=>
"<div class='row'><div>"+p[0]+"</div><div>"+p[1]+" ("+p[2]+")</div></div>"
).join("");

</script>

</body>
</html>
