<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZENTRA Cockpit V2</title>

<style>
body{
  margin:0;
  background:#05080f;
  color:#eaf0ff;
  font-family:Arial,sans-serif;
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px
}

.brand{
  font-size:24px;font-weight:900;letter-spacing:.08em
}

.tag{opacity:.6;font-size:12px}

.hero{
  padding:28px;
  border-radius:24px;
  background:linear-gradient(135deg,#0c1426,#0a0f1c);
  border:1px solid #243556;
  box-shadow:0 0 40px rgba(0,0,0,0.6)
}

.decision{
  font-size:64px;
  font-weight:900;
  margin:10px 0;
}

.buy{color:#2effa1}
.sell{color:#ff5c5c}
.wait{color:#ffd166}

.pill{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#16233a;
  margin-right:6px;
  font-size:13px;
}

.row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-top:16px
}

.card{
  padding:18px;
  border-radius:18px;
  background:#0c1322;
  border:1px solid #22314d;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#3a4e7a;
}

.label{
  opacity:.6;
  font-size:11px;
  text-transform:uppercase;
}

.value{
  font-size:30px;
  font-weight:900;
  margin-top:8px;
}

.section{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
  margin-top:16px
}

.driver{
  padding:12px;
  border-radius:14px;
  background:#101a2e;
  margin-top:8px;
}

.portfolio{
  margin-top:16px;
}

.portfolio table{
  width:100%;
  border-collapse:collapse;
}

.portfolio td{
  padding:12px;
  border-bottom:1px solid #23314d;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

.badge-buy{background:#123c2a;color:#2effa1}
.badge-sell{background:#3c1a1a;color:#ff5c5c}
.badge-wait{background:#3c3312;color:#ffd166}

.decision-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}

.decision-grid > div{
  background:#0b1324;
  border:1px solid #22314d;
  border-radius:16px;
  padding:14px;
}

.mini-value{
  font-size:20px;
  font-weight:900;
  margin-top:8px;
}

.mini-text{
  font-size:13px;
  opacity:.78;
  margin-top:8px;
  line-height:1.45;
}

@media(max-width:800px){
  .row,.section{grid-template-columns:1fr}
  .decision{font-size:44px}
}
</style>
</head>

<body>
<main class="wrap">

<div class="top">
  <div>
    <div class="brand">ZENTRA COCKPIT</div>
    <div class="tag">Investor-Level Decision Surface</div>
  </div>
  <div class="pill">LIVE</div>
</div>

<div class="hero">
  <div class="label">Final Decision</div>
  <div id="decision" class="decision">BUY</div>
  <div>
    <span class="pill" id="confidence"></span>
    <span class="pill" id="riskBand"></span>
    <span class="pill" id="systemState"></span>
  </div>

  <div class="decision-grid">
    <div>
      <div class="label">Recommended Action</div>
      <div class="mini-value" id="recommendedAction"></div>
    </div>
    <div>
      <div class="label">Decision Reason</div>
      <div class="mini-text" id="decisionReason"></div>
    </div>
    <div>
      <div class="label">Execution Readiness</div>
      <div class="mini-value" id="executionReadiness"></div>
    </div>
  </div>
</div>

<div class="row">
  <div class="card"><div class="label">Risk</div><div id="risk" class="value"></div></div>
  <div class="card"><div class="label">Stress</div><div id="stress" class="value"></div></div>
  <div class="card"><div class="label">Signal</div><div id="signal" class="value"></div></div>
  <div class="card"><div class="label">Macro</div><div id="macro" class="value"></div></div>
</div>

<div class="section">
  <div class="card">
    <div class="label">Insight</div>
    <div id="drivers"></div>
  </div>

  <div class="card">
    <div class="label">Scenario</div>
    <div id="position" class="value"></div>
    <p id="scenario"></p>
  </div>
</div>

<div class="card portfolio">
  <div class="label">Portfolio</div>
  <table id="portfolio"></table>
</div>

</main>

<script>
const data={
activeProduct:"Financial Trade",
decision:"BUY",
confidence:78,
risk:72,
stress:64,
signal:"BUY",
macro:68,
position:"LONG",
scenario:"UP scenario active — risk/reward acceptable.",
systemState:"OPERATIONAL",
recommendedAction:"Proceed with controlled exposure",
decisionReason:"Signal strength is positive, risk is elevated but still acceptable, and liquidity remains stable.",
executionReadiness:"READY",
drivers:[
{
title:"Macro trend positive",
detail:"External pressure supports the decision direction.",
impact:"HIGH"
},
{
title:"Risk aligned",
detail:"Risk level is elevated but still inside acceptable decision range.",
impact:"MEDIUM"
},
{
title:"Liquidity stable",
detail:"No immediate liquidity stress detected in the current scenario.",
impact:"LOW"
}
],
portfolio:[
{entity:"Risk Intelligence",decision:"WAIT",score:72,risk:"HIGH",confidence:71,comment:"Risk elevated; monitor before action."},
{entity:"Credit Intelligence",decision:"REVIEW",score:66,risk:"MEDIUM",confidence:69,comment:"Payment capacity requires additional check."},
{entity:"Financial Trade",decision:"BUY",score:78,risk:"MEDIUM",confidence:78,comment:"Signal is strong with acceptable risk bridge."}
]
};

function band(v){
 if(v<40)return"LOW";
 if(v<70)return"MEDIUM";
 return"HIGH";
}

const d=document.getElementById("decision");
d.textContent=data.decision;
d.className="decision "+data.decision.toLowerCase();

document.getElementById("confidence").textContent="Confidence "+data.confidence+"%";
document.getElementById("riskBand").textContent="Risk "+band(data.risk);
document.getElementById("systemState").textContent=data.systemState;
document.getElementById("recommendedAction").textContent=data.recommendedAction;
document.getElementById("decisionReason").textContent=data.decisionReason;
document.getElementById("executionReadiness").textContent=data.executionReadiness;

document.getElementById("risk").textContent=data.risk;
document.getElementById("stress").textContent=data.stress;
document.getElementById("signal").textContent=data.signal;
document.getElementById("macro").textContent=data.macro;

document.getElementById("position").textContent=data.position;
document.getElementById("scenario").textContent=data.scenario;

document.getElementById("assistant").innerText = zentraAssistant(data);

document.getElementById("drivers").innerHTML=
data.drivers.map(x=>{
  return "<div class='driver'>"+
    "<strong>"+x.title+"</strong>"+
    "<p style='margin:6px 0 0;opacity:.72;font-size:13px'>"+x.detail+"</p>"+
    "<span class='pill' style='margin-top:8px'>Impact "+x.impact+"</span>"+
  "</div>";
}).join("");

document.getElementById("portfolio").innerHTML=
"<tr><td><b>Entity</b></td><td><b>Decision</b></td><td><b>Score</b></td><td><b>Risk</b></td><td><b>Confidence</b></td><td><b>Comment</b></td></tr>"+
data.portfolio.map(r=>{
let cls=r.decision=="BUY"?"badge-buy":r.decision=="SELL"?"badge-sell":"badge-wait";
return "<tr>"+
"<td>"+r.entity+"</td>"+
"<td><span class='badge "+cls+"'>"+r.decision+"</span></td>"+
"<td>"+r.score+"</td>"+
"<td>"+r.risk+"</td>"+
"<td>"+r.confidence+"%</td>"+
"<td style='opacity:.75'>"+r.comment+"</td>"+
"</tr>";
}).join("");





function zentraAssistant(data){

  let ctx = {
    product: data.activeProduct || "General",
    decision: data.decision,
    confidence: data.confidence,
    risk: data.risk,
    stress: data.stress,
    macro: data.macro,
    position: data.position,
    drivers: data.drivers
  };

  let productVoice = "";

  if(ctx.product === "Risk Intelligence"){
    productVoice = "Risk view: focus on exposure, stress, and deviation. ";
  } else if(ctx.product === "Credit Intelligence"){
    productVoice = "Credit view: focus on payment capacity, credit stress, and approval risk. ";
  } else if(ctx.product === "Financial Trade"){
    productVoice = "Trade view: focus on signal strength, risk bridge, and execution readiness. ";
  } else {
    productVoice = "System view: focus on decision quality and risk control. ";
  }

  let explain = productVoice;
  explain += "Decision: " + ctx.decision + ". ";
  explain += "Risk level: " + ctx.risk + ". ";
  explain += "Confidence: " + ctx.confidence + "%. ";

  if(ctx.drivers && ctx.drivers.length){
    explain += "Drivers: " + ctx.drivers.map(d => d.title).join(", ") + ". ";
  }

  let action = "";

  if(ctx.product === "Risk Intelligence"){
    action = ctx.risk > 70
      ? "Reduce exposure or review before commitment."
      : "Proceed with monitored risk.";
  } else if(ctx.product === "Credit Intelligence"){
    action = ctx.risk > 70
      ? "Request additional payment evidence or restructure."
      : "Credit decision can move forward with standard checks.";
  } else if(ctx.product === "Financial Trade"){
    if(ctx.decision === "BUY"){
      action = ctx.risk > 70 ? "Use controlled exposure only." : "Controlled execution is reasonable.";
    } else if(ctx.decision === "SELL"){
      action = "Reduce or close exposure.";
    } else {
      action = "Wait for stronger confirmation.";
    }
  } else {
    action = "Monitor and proceed according to risk band.";
  }

  let warning = "";

  if(ctx.risk > 75) warning += "High risk environment. ";
  if(ctx.confidence < 55) warning += "Low confidence. ";
  if(ctx.product === "Financial Trade" && ctx.risk > 70 && ctx.decision === "BUY"){
    warning += "Trade-risk tension detected. ";
  }
  if(ctx.product === "Credit Intelligence" && ctx.risk > 70){
    warning += "Approval risk is elevated. ";
  }

  return (
    "PRODUCT: " + ctx.product +
    " | WHY: " + explain +
    " | ACTION: " + action +
    (warning ? " | WARNING: " + warning : "")
  );
}



</script>

</body>
</html>
