<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Cockpit</title>

<script src="./components/app-state.js"></script>
<script src="./components/app-router.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0b0f1a;
  color:#e5e7eb;
}
a{text-decoration:none;color:inherit}
.shell{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:18px 20px;
  border-bottom:1px solid #1f2937;
  background:#0f172a;
  position:sticky;
  top:0;
  z-index:10;
}
.brand{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.brand-title{
  font-size:15px;
  font-weight:700;
  letter-spacing:.6px;
}
.brand-sub{
  font-size:12px;
  opacity:.65;
}
.topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.status-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:90px;
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  border:1px solid #243041;
  background:#111827;
  color:#cbd5e1;
}
.lang-group{
  display:flex;
  gap:6px;
}
.lang-btn,
.nav-btn,
.run-btn,
.ghost-btn{
  border:1px solid #334155;
  background:#111827;
  color:#e5e7eb;
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
  cursor:pointer;
}
.lang-btn.active,
.nav-btn.active{
  background:#2563eb;
  border-color:#2563eb;
  color:#fff;
}
.main-nav{
  display:flex;
  gap:10px;
  padding:14px 20px;
  border-bottom:1px solid #1f2937;
  background:#0b1220;
  flex-wrap:wrap;
}
.page{
  width:100%;
  max-width:1240px;
  margin:0 auto;
  padding:20px;
}
.hero{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:20px;
  margin-bottom:20px;
}
.panel{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:16px;
  padding:18px;
}
.panel-title{
  font-size:14px;
  opacity:.72;
  margin-bottom:14px;
}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.label{
  font-size:12px;
  opacity:.75;
}
.input,.select{
  width:100%;
  background:#0b1220;
  color:#e5e7eb;
  border:1px solid #334155;
  border-radius:10px;
  padding:12px;
  font-size:14px;
  outline:none;
}
.input:focus,.select:focus{
  border-color:#2563eb;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
.run-btn{
  background:#2563eb;
  border-color:#2563eb;
  color:#fff;
}
.helper{
  margin-top:10px;
  font-size:12px;
  opacity:.68;
  line-height:1.5;
}
.message{
  margin-top:12px;
  font-size:13px;
  opacity:.92;
}
.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}
.summary-item{
  background:#0b1220;
  border:1px solid #263244;
  border-radius:12px;
  padding:12px;
}
.summary-label{
  font-size:12px;
  opacity:.65;
}
.summary-value{
  margin-top:6px;
  font-size:16px;
  font-weight:700;
  word-break:break-word;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:16px;
}
.card-title{
  font-size:13px;
  opacity:.68;
}
.card-value{
  font-size:30px;
  font-weight:700;
  margin-top:8px;
  word-break:break-word;
}
.card-text{
  margin-top:10px;
  font-size:13px;
  line-height:1.55;
  opacity:.88;
  white-space:pre-wrap;
}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  margin-top:10px;
}
.low{background:#064e3b;color:#34d399;}
.mid{background:#78350f;color:#fbbf24;}
.high{background:#7f1d1d;color:#f87171;}
.footer{
  padding:20px;
  text-align:center;
  opacity:.5;
  font-size:12px;
}
@media (max-width:900px){
  .hero{
    grid-template-columns:1fr;
  }
}
</style>
</head>

function t(key){
  const lang = (window.ZENTRA && ZENTRA.get().lang.active) || "tr";
  return (COPY[lang] && COPY[lang][key]) || COPY.tr[key] || key;
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function formatTime(ts){
  if(!ts) return "--";
  try{
    return new Date(ts).toLocaleString();
  }catch(e){
    return String(ts);
  }
}

function normalizeDecision(value){
  const lang = ZENTRA.get().lang.active;
  const v = String(value || "--").toLowerCase();
  if(lang === "tr"){
    if(v === "monitor") return "İzle";
    if(v === "approve") return "Onayla";
    if(v === "reject") return "Reddet";
    if(v === "review") return "İncele";
  }
  if(lang === "ar"){
    if(v === "monitor") return "مراقبة";
    if(v === "approve") return "موافقة";
    if(v === "reject") return "رفض";
    if(v === "review") return "مراجعة";
  }
  return value ?? "--";
}

function normalizeLevel(value){
  const lang = ZENTRA.get().lang.active;
  const v = String(value || "--").toLowerCase();
  if(lang === "tr"){
    if(v === "low") return "Düşük";
    if(v === "moderate") return "Orta";
    if(v === "high" || v === "elevated") return "Yüksek";
    if(v === "stable") return "Stabil";
  }
  if(lang === "ar"){
    if(v === "low") return "منخفض";
    if(v === "moderate") return "متوسط";
    if(v === "high" || v === "elevated") return "مرتفع";
    if(v === "stable") return "مستقر";
  }
  return value ?? "--";
}

function macroNoteText(value){
  const normalized = String(value || "").toLowerCase();
  if(normalized.includes("moderate") || normalized.includes("orta") || normalized.includes("متوسط")){
    return t("moderate");
  }
  if(normalized.includes("high") || normalized.includes("elevated") || normalized.includes("yüksek") || normalized.includes("مرتفع")){
    return t("elevated");
  }
  return t("stable");
}

function bandClass(v){
  const n = Number(v || 0);
  if(n >= 70) return ["HIGH","high"];
  if(n >= 40) return ["MID","mid"];
  return ["LOW","low"];
}

function updateTopShell(){
  const state = ZENTRA.get();
  document.getElementById("brandSub").innerText = t("brandSub");
  document.getElementById("statusPill").innerText = String(state.connection.status || "idle").toUpperCase();

  ["tr","en","ar"].forEach(code => {
    document.getElementById("lang-" + code).classList.toggle("active", state.lang.active === code);
  });

  document.getElementById("nav-cockpit").innerText = t("cockpit");
  document.getElementById("nav-report").innerText = t("report");
  document.getElementById("nav-modules").innerText = t("modules");

  document.getElementById("nav-cockpit").classList.toggle("active", state.route.current === "cockpit");
  document.getElementById("nav-report").classList.toggle("active", state.route.current === "report");
  document.getElementById("nav-modules").classList.toggle("active", state.route.current === "modules");
}

function setLang(lang){
  ZENTRA.setLang(lang);
  renderCurrentRoute();
}

function goRoute(route){
  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.navigate(route);
  }else{
    window.location.hash = route;
  }
}

function buildPayloadFromDom(){
  return {
    amount: Number(document.getElementById("amount").value || 0),
    payment_delay_days: Number(document.getElementById("paymentDelayDays").value || 0),
    customer_score: Number(document.getElementById("customerScore").value || 0),
    exposure_ratio: Number(document.getElementById("exposureRatio").value || 0),
    sector: document.getElementById("sector").value || "trade",
    country: document.getElementById("country").value || "TR"
  };
}

function safeOutputPayload(data, payload){
  return {
    risk: data.risk ?? data.risk_score ?? FALLBACK_OUTPUT.risk,
    stress: data.stress ?? data.stress_score ?? FALLBACK_OUTPUT.stress,
    decision: data.decision ?? data.recommended_action ?? data.action ?? FALLBACK_OUTPUT.decision,
    macro: data.macro ?? data.macro_pressure ?? FALLBACK_OUTPUT.macro,
    trade: data.trade ?? data.trade_signal ?? data.signal ?? FALLBACK_OUTPUT.trade,
    deviation: data.deviation ?? data.deviation_level ?? data.overall_level ?? FALLBACK_OUTPUT.deviation,
    regime: data.regime ?? data.market_regime ?? FALLBACK_OUTPUT.regime,
    dominant_lens: data.dominant_lens ?? data.lens ?? payload.sector ?? FALLBACK_OUTPUT.dominant_lens,
    strategy: data.strategy ?? data.recommendation ?? FALLBACK_OUTPUT.strategy,
    rationale: data.rationale ?? data.reason ?? data.alert ?? FALLBACK_OUTPUT.rationale,
    raw: data.raw ?? data
  };
}

function setMessage(text){
  const el = document.getElementById("messageBox");
  if(el) el.innerText = text;
}

function loadFallback(){
  ZENTRA.setOutput(FALLBACK_OUTPUT);
  ZENTRA.setConnection("fallback");
  renderCurrentRoute();
  setMessage(t("fallbackLoaded"));
}

async function runRisk(){
  const payload = buildPayloadFromDom();

  ZENTRA.setInput(payload);
  ZENTRA.setLoading(true);
  ZENTRA.clearError();
  ZENTRA.setConnection("loading");
  renderCurrentRoute();
  setMessage(t("sending"));

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let json = {};

    try{
      json = text ? JSON.parse(text) : {};
    }catch(parseErr){
      json = { raw_text: text };
    }

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    ZENTRA.setOutput(safeOutputPayload(json, payload));
    ZENTRA.setConnection("live");
    ZENTRA.setLoading(false);
    renderCurrentRoute();
    setMessage(t("liveReceived"));
  }catch(err){
    ZENTRA.setError(String(err.message || err));
    ZENTRA.setLoading(false);
    ZENTRA.setOutput(FALLBACK_OUTPUT);
    ZENTRA.setConnection("fallback");
    renderCurrentRoute();
    setMessage(t("fallbackFail") + " " + String(err.message || err));
  }
}

        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("deviation"))}</div>
          <div class="card-value">${escapeHtml(normalizeLevel(output.deviation))}</div>
        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("regime"))}</div>
          <div class="card-value">${escapeHtml(output.regime ?? "--")}</div>
        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("dominantLens"))}</div>
          <div class="card-value">${escapeHtml(output.dominant_lens ?? "--")}</div>
        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("strategy"))}</div>
          <div class="card-text">${escapeHtml(output.strategy ?? "--")}</div>
        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("rationale"))}</div>
          <div class="card-text">${escapeHtml(output.rationale ?? "--")}</div>
        </div>

        <div class="card">
          <div class="card-title">${escapeHtml(t("raw"))}</div>
          <div class="card-text">${escapeHtml(JSON.stringify(output.raw ?? {}, null, 2))}</div>
        </div>
      </div>
    </div>
  `;
}

function renderReportPage(){
  return `
    <div class="page">
      <div class="panel">
        <div class="panel-title">${escapeHtml(t("reportTitle"))}</div>
        <div class="card-text">${escapeHtml(t("reportText"))}</div>
      </div>
    </div>
  `;
}

function renderModulesPage(){
  return `
    <div class="page">
      <div class="panel">
        <div class="panel-title">${escapeHtml(t("modulesTitle"))}</div>
        <div class="card-text">${escapeHtml(t("modulesText"))}</div>
      </div>
    </div>
  `;
}

function renderCurrentRoute(){
  updateTopShell();

  const root = document.getElementById("app-root");
  const route = ZENTRA.get().route.current || "cockpit";

  if(route === "report"){
    root.innerHTML = renderReportPage();
  } else if(route === "modules"){
    root.innerHTML = renderModulesPage();
  } else {
    root.innerHTML = renderCockpitPage();
  }

  ZENTRA.trace("UI_RENDER", {
    route: ZENTRA.get().route.current,
    lang: ZENTRA.get().lang.active,
    connection: ZENTRA.get().connection.status
  });
}

(function bootstrap(){
  const state = ZENTRA.get();

  if(!state.input.amount){
    ZENTRA.setInput({
      amount: 150000,
      payment_delay_days: 7,
      customer_score: 72,
      exposure_ratio: 0.38,
      sector: "trade",
      country: "TR"
    });
  }

  if(!state.output.risk){
    ZENTRA.setOutput(FALLBACK_OUTPUT);
    ZENTRA.setConnection("fallback");
  }

  const originalSetRoute = ZENTRA.setRoute.bind(ZENTRA);
  ZENTRA.setRoute = function(route){
    originalSetRoute(route);
    renderCurrentRoute();
  };

  if(window.ZENTRA_ROUTER){
    window.ZENTRA_ROUTER.init();
  } else {
    const hash = window.location.hash.replace("#","") || "cockpit";
    ZENTRA.setRoute(hash);
  }

  renderCurrentRoute();
})();
</script>
