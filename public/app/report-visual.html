<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ZENTRA Report View</title>
<style>
body{margin:0;background:#060b14;color:#fff;font-family:Arial}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.hero{background:#101a2f;padding:20px;border-radius:14px}
.big{font-size:56px;font-weight:900;color:#2effa1}
.card{background:#111a2f;padding:14px;border-radius:10px;margin-top:12px}
.label{font-size:11px;color:#9aa3b2;text-transform:uppercase}
.line{margin-top:6px}
strong{color:#2effa1}
</style>
</head>

<body>
<div class="wrap">

<h2>ZENTRA Intelligence Output</h2>

<div class="hero">
<div class="label">Final Decision</div>
<div class="big" id="decision"></div>
<div id="summary"></div>
</div>

<div class="card">
<div class="label">Decision Position</div>
<div id="position"></div>
</div>

<div class="card">
<div class="label">Insight</div>
<div id="insight"></div>
</div>

<div class="card">
<div class="label">Assistant</div>
<div id="assistant"></div>
</div>

<div class="card">
<div class="label">Portfolio</div>
<div id="portfolio"></div>
</div>

</div>

<script>
const d = window.ZENTRA_DATA || {
decision:"BUY",
risk:72,
confidence:78,
drivers:["Macro positive","Risk aligned","Liquidity stable"]
};

document.getElementById("decision").textContent = d.decision;
document.getElementById("summary").textContent =
"High confidence signal with controlled risk environment.";

document.getElementById("position").innerHTML =
"Confidence: <strong>"+d.confidence+"%</strong><br>Risk: HIGH";

document.getElementById("insight").innerHTML =
d.drivers.join("<br>");

document.getElementById("assistant").innerHTML =
"WHY: strong signal<br>ACTION: controlled entry<br>WARNING: high risk";

document.getElementById("portfolio").innerHTML =
"Risk Intelligence → CAUTION<br>Credit → REVIEW<br>Trade → BUY";
</script>


<script src="./zui-surfaces-v3.js"></script>

<script src="./chart-engine.js"></script>

<script src="./zentra-intelligence.js"></script>

<script src="./data/zentra-state.js"></script>
<script src="./state-binding.js"></script>
<script src="./intelligence/scenario-engine-v1.js"></script>
<script src="./intelligence/conflict-resolver-v1.js"></script>
<script src="./intelligence/simulation-engine-v1.js"></script>
<script src="./intelligence/exposure-engine-v1.js"></script>
<script src="./real-data-api-v3.js"></script>


<script src="./zentra-assistant-float.js"></script>
<script src="./assistant-intelligence.js"></script>

<script src="./legal-footer.js"></script>

<script src="./intelligence/depth-engine-v2.js"></script>

<script src="./intelligence/report-intelligence-v2.js"></script>

<script src="./assistant-operator-v2.js"></script>

<script src="./quality/product-maturity.js"></script>
</body>
</html>
