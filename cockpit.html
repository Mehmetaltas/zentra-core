<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZENTRA Cockpit v4.1 (Live)</title>

<style>
body{margin:0;background:#0b0f14;color:#e5e7eb;font-family:Arial}
.top{display:flex;justify-content:space-between;padding:10px;background:#111827}
.container{display:flex;height:calc(100vh - 50px)}
.left,.right{width:260px;background:#0f172a;padding:10px}
.main{flex:1;padding:10px}
.card{background:#111827;padding:10px;margin-bottom:10px;border-radius:6px}
button{display:block;width:100%;margin-bottom:5px;background:#1f2937;color:white;border:none;padding:8px;cursor:pointer}
.green{color:#22c55e}.red{color:#ef4444}.yellow{color:#facc15}
</style>
</head>

<body>

<div class="top">
  <div>ZENTRA Cockpit v4.1 (Live Data)</div>
  <select id="mode" onchange="refresh()">
    <option>Pulse</option>
    <option>Signal</option>
    <option>Vector</option>
    <option>Forge</option>
    <option>Sentinel</option>
    <option>Atlas</option>
    <option>Apex</option>
    <option>Founder</option>
  </select>
</div>

<div class="container">

<div class="left">
  <button onclick="load('XU100')">XU100</button>
  <button onclick="load('BTCUSDT')">BTC</button>
</div>

<div class="main">
  <div class="card" id="modules"></div>
  <div class="card" id="engine"></div>
  <div class="card" id="assistant"></div>
</div>

<div class="right">
  <div class="card" id="risk"></div>
  <div class="card" id="decision"></div>
  <div class="card" id="offer"></div>
</div>

</div>

<script>

// ===== REGISTRY =====
const registry = {
modules:{
  RiskCore:{desc:"Risk skor üretimi"},
  PayRoute:{desc:"Ödeme yönlendirme"},
  CreditCore:{desc:"Kredi skorlama"},
  FraudSentinel:{desc:"Dolandırıcılık tespiti"},
  ContractMind:{desc:"Sözleşme analizi"},
  LiquidityCore:{desc:"Likidite yönetimi"},
  Simulation:{desc:"Senaryo üretimi"}
},
modes:{
  Pulse:["RiskCore"],
  Signal:["RiskCore","FraudSentinel","CreditCore"],
  Vector:["RiskCore","PayRoute","CreditCore","LiquidityCore"],
  Forge:["RiskCore","Simulation"],
  Sentinel:["RiskCore","FraudSentinel","ContractMind"],
  Atlas:["RiskCore","LiquidityCore"],
  Apex:["ALL"],
  Founder:["ALL"]
}
};

// ===== LIVE ENGINE =====
async function engine(asset){

  let price, risk;

  if(asset==="BTCUSDT"){
    const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    const data = await res.json();
    price = Math.floor(data.price);

    // basit risk simülasyonu (şimdilik)
    risk = Math.floor(Math.random()*100);
  } else {
    // fallback (BIST yok)
    price = Math.floor(Math.random()*10000);
    risk = Math.floor(Math.random()*100);
  }

  return {
    asset,
    price,
    risk,
    decision: risk>70?"Dikkat":"Takip"
  };
}

// ===== ASSISTANT =====
function explain(m,risk){
  if(m==="RiskCore"){
    if(risk>70) return "Risk yüksek → dikkatli ilerle";
    if(risk>40) return "Orta risk → kontrollü takip";
    return "Düşük risk → uygun alan";
  }
  if(m==="FraudSentinel") return "Fraud kontrol aktif";
  if(m==="CreditCore") return "Kredi analiz yapılıyor";
  if(m==="PayRoute") return "Ödeme rotası optimize ediliyor";
  if(m==="LiquidityCore") return "Likidite analiz ediliyor";
  if(m==="ContractMind") return "Sözleşme inceleniyor";
  if(m==="Simulation") return "Senaryo üretiliyor";
  return "Analiz çalışıyor";
}

// ===== SALES =====
function setMode(m){
  document.getElementById("mode").value = m;
  refresh();
}

function offer(risk){
  if(risk<40) return "Başlangıç<br><button onclick='setMode(\"Signal\")'>Signal</button>";
  if(risk<70) return "Orta<br><button onclick='setMode(\"Vector\")'>Vector</button>";
  return "Yüksek<br><button onclick='setMode(\"Sentinel\")'>Sentinel</button>";
}

// ===== RENDER =====
async function render(asset){
  const data = await engine(asset);
  const mode = document.getElementById("mode").value;

  let mods = registry.modes[mode];
  if(mods[0]==="ALL") mods = Object.keys(registry.modules);

  let mhtml="<b>Modüller:</b><br>";
  let ahtml="<b>Assistant:</b><br>";

  mods.forEach(m=>{
    mhtml+=`<br><b>${m}</b><br>${registry.modules[m].desc}`;
    ahtml+=`<br>${m}: ${explain(m,data.risk)}`;
  });

  document.getElementById("modules").innerHTML=mhtml;
  document.getElementById("assistant").innerHTML=ahtml;

  document.getElementById("engine").innerHTML =
    "Asset:"+data.asset+"<br>Fiyat:"+data.price;

  let rc=data.risk>70?"red":data.risk>40?"yellow":"green";

  document.getElementById("risk").innerHTML =
    "Risk:<span class='"+rc+"'>"+data.risk+"</span>";

  document.getElementById("decision").innerHTML =
    "Decision:"+data.decision;

  document.getElementById("offer").innerHTML =
    "<b>Öneri:</b><br>"+offer(data.risk);
}

// ===== LOAD =====
let current="BTCUSDT";

function load(a){
  current=a;
  render(a);
}

function refresh(){
  render(current);
}

load("BTCUSDT");

</script>

</body>
</html>
