<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZENTRA Financial Cockpit</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0f14;color:#e5e7eb}
.topbar{height:54px;padding:10px 14px;background:#111827;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #243244}
.logo{font-weight:700;letter-spacing:.5px}
select,button{background:#1f2937;color:#e5e7eb;border:1px solid #374151;border-radius:8px;padding:8px 10px}
button{width:100%;margin-top:8px;text-align:left;cursor:pointer}
button:hover{background:#273449}
.container{display:flex;min-height:calc(100vh - 54px)}
.left{width:230px;background:#0f172a;padding:12px;border-right:1px solid #243244}
.main{flex:1;padding:12px}
.right{width:320px;background:#0f172a;padding:12px;border-left:1px solid #243244}
.card{background:#111827;padding:14px;margin-bottom:12px;border-radius:12px;border:1px solid #243244;box-shadow:0 8px 20px rgba(0,0,0,.18)}
.title{font-size:13px;color:#9ca3af;margin-bottom:8px}
.value{font-size:28px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.green{color:#22c55e}.red{color:#ef4444}.yellow{color:#facc15}.blue{color:#60a5fa}.gray{color:#9ca3af}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#1f2937;border:1px solid #374151;font-size:12px;margin-top:6px}
.chartBox{height:260px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#111827,#172033);border-radius:10px;color:#9ca3af}
.small{font-size:13px;line-height:1.45;color:#cbd5e1}
hr{border:0;border-top:1px solid #243244;margin:10px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ZENTRA Financial Cockpit</div>
  <div>
    <select id="mode" onchange="refreshCurrent()">
      <option>Pulse</option>
      <option>Signal</option>
      <option>Vector</option>
      <option>Forge</option>
      <option>Sentinel</option>
      <option>Atlas</option>
      <option>Apex</option>
      <option>Founder</option>
    </select>
  </div>
</div>

<div class="container">
  <aside class="left">
    <div class="card">
      <div class="title">Market</div>
      <button onclick="loadAsset('BIST:XU100')">BIST:XU100</button>
      <button onclick="loadAsset('BIST:THYAO')">BIST:THYAO</button>
      <button onclick="loadAsset('USDTRY')">USD/TRY</button>
      <button onclick="loadAsset('GOLD')">Altın</button>
      <button onclick="loadAsset('BTC')">BTC</button>
    </div>

    <div class="card small">
      <b>Aktif kural:</b><br>
      Veri + anlam + bağlam + etki gösterilir.
    </div>
  </aside>

  <main class="main">
    <div class="grid">
      <div class="card">
        <div class="title">Varlık</div>
        <div id="assetName" class="value">-</div>
        <span id="trendBadge" class="badge">-</span>
      </div>
      <div class="card">
        <div class="title">Fiyat</div>
        <div id="price" class="value">-</div>
        <div id="change" class="small">-</div>
      </div>
    </div>

    <div class="card">
      <div class="title">Chart Layer</div>
      <div id="chart" class="chartBox">Grafik alanı</div>
    </div>

    <div class="card">
      <div class="title">Research / News</div>
      <div id="news" class="small">-</div>
    </div>
  </main>

  <aside class="right">
    <div class="card">
      <div class="title">Risk</div>
      <div id="risk" class="value">-</div>
      <div id="riskMeaning" class="small">-</div>
    </div>

    <div class="card">
      <div class="title">Scenario / Simulation</div>
      <div id="scenario" class="small">-</div>
    </div>

    <div class="card">
      <div class="title">Decision / Assistant</div>
      <div id="decision" class="small">-</div>
    </div>

    <div class="card">
      <div class="title">Audit</div>
      <div id="audit" class="small">-</div>
    </div>
  </aside>
</div>

<script>
let currentAsset = "BIST:XU100";

const productRegistry = {
  zentra_pulse: {
    name: "ZENTRA Pulse",
    modules: ["market_overview","chart","news","basic_risk"],
    market: ["public"],
    assistant: "zentra_assistant_trade"
  },
  zentra_signal: {
    name: "ZENTRA Signal",
    modules: ["indicator","alert","screener","macro_signal"],
    market: ["public","professional"],
    assistant: "zentra_assistant_trade"
  },
  zentra_founder: {
    name: "ZENTRA Founder",
    modules: ["private_decision","risk","simulation","portfolio"],
    market: ["founder"],
    assistant: "zentra_assistant_founder"
  }
};

function randomBetween(min,max){
  return Math.random()*(max-min)+min;
}

function generateData(asset){
  const risk = Math.floor(randomBetween(20,92));
  const change = randomBetween(-3.5,3.5);
  const bull = randomBetween(35,75);
  const bear = 100 - bull;

  return {
    asset,
    price: Math.floor(randomBetween(1000,12000)),
    change: change.toFixed(2),
    trend: change >= 0 ? "up" : "down",
    risk_score: risk,
    volatility: risk > 70 ? "high" : risk > 45 ? "medium" : "low",
    momentum: change > 1 ? "strong" : change < -1 ? "weak" : "neutral",
    macro_pressure: risk > 65 ? "high" : "medium",
    scenarios: [
      { name: "Yukarı Senaryo", probability: bull.toFixed(1) },
      { name: "Aşağı Senaryo", probability: bear.toFixed(1) }
    ],
    simulation: {
      downside_risk: (risk/100).toFixed(2),
      stress_result: risk > 70 ? "stressed" : "stable"
    },
    decision: {
      public: risk > 70 ? "Risk yüksek, dikkatli ilerle." : risk > 45 ? "Kontrollü takip uygun." : "Risk düşük, izleme uygun.",
      founder: risk > 70 ? "RISK_REDUCE" : change > 1 ? "BUY_PARTIAL" : "WAIT"
    },
    audit: {
      source: "zentra_mock_engine_v1",
      confidence: randomBetween(0.72,0.93).toFixed(2),
      last_update: new Date().toISOString()
    }
  };
}

function riskClass(score){
  if(score > 70) return "red";
  if(score > 45) return "yellow";
  return "green";
}

function assistantMeaning(data){
  let meaning = "";
  if(data.risk_score > 70){
    meaning = "Anlam: Yüksek risk. Bağlam: Volatilite ve makro baskı artmış. Etki: Pozisyon dikkatli yönetilmeli.";
  } else if(data.risk_score > 45){
    meaning = "Anlam: Orta risk. Bağlam: Piyasa yön arıyor. Etki: Kademeli ve kontrollü takip daha sağlıklı.";
  } else {
    meaning = "Anlam: Düşük risk. Bağlam: Stres sınırlı. Etki: İzleme ve fırsat tarama için uygun alan.";
  }
  return meaning;
}

function render(data){
  const mode = document.getElementById("mode").value;

  document.getElementById("assetName").textContent = data.asset;
  document.getElementById("price").textContent = data.price.toLocaleString("tr-TR");
  document.getElementById("change").innerHTML =
    `Değişim: <span class="${data.trend === "up" ? "green" : "red"}">%${data.change}</span>`;

  document.getElementById("trendBadge").textContent = data.trend === "up" ? "Yukarı trend" : "Aşağı baskı";
  document.getElementById("trendBadge").className = "badge " + (data.trend === "up" ? "green" : "red");

  document.getElementById("chart").innerHTML =
    `<div>
      <b>${data.asset}</b><br><br>
      Grafik + Risk Overlay + Senaryo Yolu<br>
      <span class="gray">Mode: ${mode}</span>
    </div>`;

  document.getElementById("news").innerHTML =
    `Veri: Piyasa hareketi izleniyor.<br>
     Anlam: Haber ve makro baskı karar etkisine dönüştürülür.<br>
     Etki: Public modda yatırım tavsiyesi verilmez, risk ve senaryo anlatılır.`;

  document.getElementById("risk").innerHTML =
    `<span class="${riskClass(data.risk_score)}">${data.risk_score}</span>`;

  document.getElementById("riskMeaning").textContent = assistantMeaning(data);

  document.getElementById("scenario").innerHTML =
    `${data.scenarios[0].name}: %${data.scenarios[0].probability}<br>
     ${data.scenarios[1].name}: %${data.scenarios[1].probability}<hr>
     Stress: ${data.simulation.stress_result}<br>
     Downside Risk: ${data.simulation.downside_risk}`;

  const founderLine = mode === "Founder"
    ? `<hr><b>Founder:</b> ${data.decision.founder}`
    : "";

  document.getElementById("decision").innerHTML =
    `<b>Public:</b> ${data.decision.public}
     ${founderLine}
     <hr>
     <b>Assistant:</b> Bu çıktı veriyle birlikte anlam, bağlam ve etki gösterir.`;

  document.getElementById("audit").innerHTML =
    `Source: ${data.audit.source}<br>
     Confidence: ${data.audit.confidence}<br>
     Update: ${data.audit.last_update}`;
}

function loadAsset(asset){
  currentAsset = asset;
  render(generateData(asset));
}

function refreshCurrent(){
  loadAsset(currentAsset);
}

loadAsset(currentAsset);
</script>

</body>
</html>
