<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZENTRA v9.1 PLAN FIXED</title>
<style>
body{background:#0b0f14;color:#fff;font-family:Arial}
.container{display:flex}
.left,.right{width:200px;padding:10px}
.main{flex:1;padding:10px}
.card{background:#111827;padding:10px;margin:10px;border-radius:8px}
button{margin:5px;padding:8px;background:#1f2937;color:white;border:none}
.lock{opacity:.4}
</style>
</head>

<body>

<h2>ZENTRA v9.1 PLAN FIXED</h2>

<div id="login" class="card">
<input id="u" placeholder="user">
<input id="p" placeholder="pass" type="password">
<button onclick="login()">Login</button>
<div id="loginMsg"></div>
</div>

<div id="app" style="display:none">
<div class="container">

<div class="left">
<button onclick="setAsset('BTCUSDT')">BTC</button>
<button onclick="setAsset('ETHUSDT')">ETH</button>
<button onclick="setAsset('XAU')">Gold</button>
<button onclick="setAsset('USDTRY')">USDTRY</button>
</div>

<div class="main">
<div class="card" id="engine"></div>
<div class="card" id="advanced"></div>
</div>

<div class="right">
<div class="card">
Plan: <span id="plan"></span><br>
<button id="upgradeBtn" onclick="upgrade()">Upgrade</button>
</div>
</div>

</div>
</div>

<script>
let token=null;
let plan="free";
let current="BTCUSDT";

async function login(){
  try{
    const r=await fetch("http://127.0.0.1:3000/api/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        user:document.getElementById("u").value,
        password:document.getElementById("p").value
      })
    });

    const d=await r.json();

    if(d.ok){
      token=d.token;
      plan=d.plan;
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      render();
    }else{
      document.getElementById("loginMsg").innerText="Login failed";
    }
  }catch(e){
    document.getElementById("loginMsg").innerText="Backend bağlantısı yok";
  }
}

async function upgrade(){
  await fetch(`http://127.0.0.1:3000/api/upgrade?token=${token}&plan=pro`);
  plan="pro";
  render();
}

async function engine(symbol){
  const r=await fetch(`http://127.0.0.1:3000/api/risk?symbol=${symbol}`);
  return await r.json();
}

async function render(){
  document.getElementById("plan").innerText=plan;

  const d=await engine(current);

  document.getElementById("engine").innerHTML=
    `${d.symbol}<br>Fiyat:${d.price}<br>Risk:${d.risk}<br>Source:${d.source}`;

  if(plan==="free"){
    document.getElementById("advanced").innerHTML=
      `<div class="lock">🔒 Advanced analytics locked</div>`;
  }else{
    document.getElementById("advanced").innerHTML=
      `Decision: ${d.decision}<br>Trend: ${d.trend}`;
  }

  document.getElementById("upgradeBtn").style.display =
    plan==="institutional" ? "none" : "inline-block";
}

function setAsset(s){
  current=s;
  render();
}
</script>

</body>
</html>
